<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Classes</title>
    <style>
        li:first-child {
        color: blue;
        }

        li:last-child {
        color: red;
        }

        li:nth-child(2) {
        color: green;
        }

        li:nth-child(even) {
        background: rgb(146, 101, 101);
        }

    </style>
</head>
<body>
    <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
    </ul>


</body>
</html>
