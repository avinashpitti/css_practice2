<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hovering elements</title>
    <style>
        p:hover{
            background-color: rebeccapurple;
            color: white;
        }
        a:hover{
            color: red;
        }
        a:active{
            color: green;
            /* when you click on it, it changes to green */
        }

        a:focus{
            border: 2px solid yellow;
        }

    </style>
</head>
<body>
    <p>This element hovers when you on it</p>
    <a href="https:www.google.com">Google</a> 

</body>
</html>
