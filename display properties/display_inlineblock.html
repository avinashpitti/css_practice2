<!DOCTYPE html>
<html>
<head>
    <title>inline-block</title>
<style>

li{
    display:inline-block;
    background:lightgray;
    height: 100px;
    /* same like inline but height,width,margin and padding works */
    padding:10px 20px;
    margin:5px;
}

.card{
    display:inline-block;
    width:200px;
    height:150px;
    background:lightgreen;
    margin:10px;
    text-align:center;
    
}


</style>

</head>

<body>

<ul>

<li>Home</li>
<li>About</li>
<li>Services</li>
<li>Contact</li>

</ul>

<div class="card">HTML</div>
<div class="card">CSS</div>
<div class="card">JavaScript</div>


</body>
</html>
