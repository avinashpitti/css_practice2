<!DOCTYPE html>
<html>
<head>
    <title>display_none</title>
<style>

.box{
    width:200px;
    height:100px;
    background-color:orange;
    margin: 2px;
}

.hide{
    display:none;
    /* It doesn't appear on the space, it doesn't take any space */
}

</style>

</head>

<body>

<div class="box">Box 1</div>
<div class="box hide">Box 2</div>
<div class="box">Box 3</div>

</body>
</html>
