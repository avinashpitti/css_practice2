<!DOCTYPE html>
<html>
<head>
    <title>block level</title>
<style>

a{
    /* even though a is an inline element we made it block level by using display:block */
    display:block;
    background-color:lightgray;
    width:200px;
    padding:10px;
    margin:5px;
    text-decoration:none;
}

span{
    display: block;
    color: green;
}

</style>

</head>

<body>

<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>

<span>HTML</span>
<span>CSS</span>
<span>JAVASCRIPT</span>


</body>
</html>
