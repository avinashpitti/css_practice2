<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inline</title>
    <style>
        div{
            background-color: blue;
            margin: 3px;
            display: inline;
            /* width: 200px;  */
            /* width and height doesn't work */
            /* height: 200px; */
            /* div is a block level element but by using display:inline we make it inline */
        }
    </style>
</head>
<body>
    <div>box 1</div>
    <div>box 2</div>
    <div>box 3</div>
</body>
</html>
