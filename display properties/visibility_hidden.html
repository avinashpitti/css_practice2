<!DOCTYPE html>
<html>
<head>
    <title>visibility_hidden</title>
<style>

.box{
    width:200px;
    height:100px;
    background-color:orange;
}

.hide{
    visibility: hidden;
    /* unlike display:none it hides the element but occupies space */
}

</style>

</head>

<body>

<div class="box">Box 1</div>
<div class="box hide">Box 2</div>
<div class="box">Box 3</div>

</body>
</html>
