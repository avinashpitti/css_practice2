<!DOCTYPE html>
<html>
<head>
    <title>display_flex</title>
<style>

.container{
    display:flex;
    /* without flex they appear vertically */
    background-color:lightgray;
}

.box{
    width:100px;
    height:100px;
    background-color:orange;
    margin:10px;
}

</style>

</head>

<body>

<div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
</div>

</body>
</html>
