<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbasis</title>
    <style>
        .container,.container1{
    display:flex;
}

.box{
    /* flex-basis defines the initial size of a flex item 
    before growing or shrinking.*/
    flex-basis:200px;
    background:orange;
    margin:5px;
}

.boxes{
    flex-basis: 200px;
    flex-shrink: 1;
    /* If you increase the no of boxes items shrink proportionally */
    background: yellowgreen;
    margin: 5px;
}

    </style>
</head>
<body>
<div class="container">

<div class="box">1</div>
<div class="box">2</div>
<div class="box">3</div>

</div>

<div class="container1">
<div class="boxes">1</div>
<div class="boxes">2</div>
<div class="boxes">3</div>
<div class="boxes">4</div>
<div class="boxes">5</div>
<div class="boxes">6</div>
<div class="boxes">7</div>


</div>
</body>
</html>
