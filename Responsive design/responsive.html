

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive</title>
    <style>

.container{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
}

.box{
    background:orange;
    padding:20px;
}

/* Tablet */

@media (min-width:768px){

.container{
    grid-template-columns:1fr 1fr;
}

}

/* Desktop */

@media (min-width:1024px){

.container{
    grid-template-columns:1fr 1fr 1fr;
}

}

</style>

</head>
<body>
    <div class="container">

<div class="box">1</div>
<div class="box">2</div>
<div class="box">3</div>

</div>

</body>
</html>
