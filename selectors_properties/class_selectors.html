<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class selector</title>
    <link rel="stylesheet" href="class_selectors.css">        
</head>
<body>
        <p class="p1">This is in an element</p>
    <h1>This is a header</h1>
    <p class="para2">A paragraph is used</p>
    <!-- we can give same class to multiple elements -->
     <!-- we can provide multiple class to same element -->
    <div>
        <p class="p1 p2">a paragraph inside div</p>
        <div>
            <p class="para2">content inside</p>
        </div>

    </div>

    <div class="container">
        <div class="box red">1</div>
        <div class="box green">2</div>
        <div class="box blue">3</div>
        <div class="box yellow">4</div>

    </div>
</body>
</html>
