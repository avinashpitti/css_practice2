<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child selectors</title>
    <style>
        div > p{
            color: blueviolet;
        }
        /* it selects p tags inside div only, not outside div */
        /* it selects only child but not its descendants */
        /* below it considers direct child of div not section */
        /* If you keep div inside section then again it selected */
        /* Incase of descendant it selects even if it is inside section */
    </style>
</head>
<body>
    <p>first para</p>
    <h1>first heading</h1>
    <p>second para</p>
    <p>third para</p>
    <div>
        <p>first para inside div tag</p>
        <h1>first heading inside div tag</h1>
        <p>second para inside div tag</p>
        <div>
            <p>item 1</p>
            <p>item 2</p>
        </div>
        <section>
                <p>rule 1</p>
                <p>rule 2</p>
            
        </section>
    </div>
</body>
</html>
