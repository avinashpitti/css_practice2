<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General sibling selector</title>
    <style>
        h1~p{
            color: greenyellow;
            /* It selects all p after h1 */
        }
    </style>
</head>
<body>
    <h1>This is heading 1</h1>
    <p>This is para 1</p>
    <p>This is para 2</p>

    <h2>This is heading 2</h2>
    <h1>This is another heading</h1>
    <p>This is para 3</p>

</body>
</html>
