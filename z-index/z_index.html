<!DOCTYPE html>
<html>
<head>
    <title>z-index</title>
<style>

.box1{
    position: absolute;
    background: red;
    width: 200px;
    height: 200px;
    top: 50px;
    left: 50px;
    z-index: 1;
}

.box2{
    position: absolute;
    background: blue;
    width: 200px;
    height: 200px;
    top: 100px;
    left: 100px;
    z-index: 2;
    /* The box which has higher z-index appears on top */
}

</style>
</head>
<body>

<div class="box1"></div>
<div class="box2"></div>

</body>
</html>
