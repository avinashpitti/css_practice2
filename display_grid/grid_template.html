<!DOCTYPE html>
<html>
<head>
    <title>grid</title>
<style>

.container{
    display:grid;
    grid-template-columns:1fr 2fr;
    /* It creates 2 columns with 1:2 ratio(fraction) */
    /* grid-template-rows: 1fr 4fr 2fr; */
    /* it divides 1 for 1st row 4 for 2nd row 2 for 3rd row and 1 for remaining  */
    /* gap item is same as flex */
}

.box{
    background:orange;
    padding:20px;
    margin:15px;
}

</style>

</head>

<body>

<div class="container">

<div class="box">1</div>
<div class="box">2</div>
<div class="box">3</div>
<div class="box">4</div>
<div class="box">5</div>
<div class="box">6</div>
<div class="box">7</div>

</div>

</body>
</html>
